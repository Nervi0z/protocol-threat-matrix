<svg viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" width="900" height="260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020810"/><stop offset="100%" stop-color="#030d1a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="radarGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#7C3AED" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#020810" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sweepGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-title"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-node"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-crit"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="clip"><rect width="900" height="260"/></clipPath>
    <clipPath id="rc"><circle cx="788" cy="130" r="95"/></clipPath>
  </defs>
  <style>
    .grid{stroke:#0b1829;stroke-width:.5;fill:none}
    .corner{stroke:#7C3AED;stroke-width:1.5;fill:none}
    .c1{stroke-dasharray:22;stroke-dashoffset:22;animation:dc .35s ease forwards .05s}
    .c2{stroke-dasharray:22;stroke-dashoffset:22;animation:dc .35s ease forwards .15s}
    .c3{stroke-dasharray:22;stroke-dashoffset:22;animation:dc .35s ease forwards .25s}
    .c4{stroke-dasharray:22;stroke-dashoffset:22;animation:dc .35s ease forwards .35s}
    .topline{stroke-dasharray:900;stroke-dashoffset:900;animation:dl 1s ease forwards .4s}
    .l0{opacity:0;animation:pop .05s forwards .5s}
    .l1{opacity:0;animation:pop .05s forwards .65s}
    .l2{opacity:0;animation:pop .05s forwards .8s}
    .l3{opacity:0;animation:pop .05s forwards .95s}
    .l4{opacity:0;animation:pop .05s forwards 1.1s}
    .l5{opacity:0;animation:pop .05s forwards 1.25s}
    .l6{opacity:0;animation:pop .05s forwards 1.4s}
    .t1{font-family:'JetBrains Mono','Courier New',monospace;font-weight:700;font-size:34px;fill:url(#titleGrad);filter:url(#glow-title);opacity:0;animation:fi .5s ease forwards 1.55s}
    .t2{font-family:'JetBrains Mono','Courier New',monospace;font-weight:700;font-size:34px;fill:url(#titleGrad);filter:url(#glow-title);opacity:0;animation:fi .5s ease forwards 1.72s}
    .sub{font-family:'JetBrains Mono','Courier New',monospace;font-size:10.5px;fill:#94A3B8;opacity:0;animation:fi .5s ease forwards 1.9s}
    .tag{opacity:0}
    .tg1{animation:tp .3s ease forwards 2.1s}.tg2{animation:tp .3s ease forwards 2.25s}
    .tg3{animation:tp .3s ease forwards 2.4s}.tg4{animation:tp .3s ease forwards 2.55s}
    .tg5{animation:tp .3s ease forwards 2.7s}.tg6{animation:tp .3s ease forwards 2.85s}
    .rb{opacity:0;animation:fi .8s ease forwards 1.6s}
    .rs{opacity:0;animation:radarshow .1s ease forwards 2.2s,sweep 3s linear infinite 2.3s;transform-origin:788px 130px}
    .node{opacity:0}
    .nc{fill:#EF4444;filter:url(#glow-crit)}
    .nm{fill:#EAB308;filter:url(#glow-node)}
    .nd1{animation:ns .3s ease forwards 2.4s}.nd2{animation:ns .3s ease forwards 2.6s}
    .nd3{animation:ns .3s ease forwards 2.8s}.nd4{animation:ns .3s ease forwards 3.0s}
    .nd5{animation:ns .3s ease forwards 3.2s}.nd6{animation:ns .3s ease forwards 3.4s}
    .nd7{animation:ns .3s ease forwards 3.6s}.nd8{animation:ns .3s ease forwards 3.8s}
    .pr{fill:none;stroke-width:1;animation:pr 2s ease-out infinite}
    .pr1{animation-delay:0s}.pr2{animation-delay:.5s}.pr3{animation-delay:1s}
    .pt{animation:fl 3.5s ease-in-out infinite;opacity:.45}
    .p1{animation-delay:0s}.p2{animation-delay:.8s}.p3{animation-delay:1.6s}
    .p4{animation-delay:2.4s}.p5{animation-delay:.4s}.p6{animation-delay:1.2s}
    .cur{animation:blink 1s step-end infinite 2.2s}
    @keyframes dc{to{stroke-dashoffset:0}}
    @keyframes dl{to{stroke-dashoffset:0}}
    @keyframes pop{to{opacity:1}}
    @keyframes fi{to{opacity:1}}
    @keyframes tp{0%{opacity:0;transform:translateY(5px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes sweep{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes radarshow{to{opacity:1}}
    @keyframes ns{0%{opacity:0;transform:scale(.3)}100%{opacity:1;transform:scale(1)}}
    @keyframes pr{0%{r:6;stroke-opacity:.8}100%{r:22;stroke-opacity:0}}
    @keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  </style>

