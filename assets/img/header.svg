<svg viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg" width="900" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020810"/>
      <stop offset="100%" stop-color="#030d1a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="radarGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#7C3AED" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#020810" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sweepGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-title">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-node">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-crit">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect width="900" height="240"/></clipPath>
    <clipPath id="radar-clip">
      <circle cx="788" cy="120" r="95"/>
    </clipPath>
  </defs>

  <style>
    .grid { stroke: #0b1829; stroke-width: 0.5; fill: none; }
    .corner { stroke: #7C3AED; stroke-width: 1.5; fill: none; }
    .c1{stroke-dasharray:22;stroke-dashoffset:22;animation:dc .35s ease forwards .05s}
    .c2{stroke-dasharray:22;stroke-dashoffset:22;animation:dc .35s ease forwards .15s}
    .c3{stroke-dasharray:22;stroke-dashoffset:22;animation:dc .35s ease forwards .25s}
    .c4{stroke-dasharray:22;stroke-dashoffset:22;animation:dc .35s ease forwards .35s}
    .topline{stroke-dasharray:900;stroke-dashoffset:900;animation:dl 1s ease forwards .4s}

    /* left panel lines */
    .l0{opacity:0;animation:pop .05s forwards .5s}
    .l1{opacity:0;animation:pop .05s forwards .65s}
    .l2{opacity:0;animation:pop .05s forwards .8s}
    .l3{opacity:0;animation:pop .05s forwards .95s}
    .l4{opacity:0;animation:pop .05s forwards 1.1s}
    .l5{opacity:0;animation:pop .05s forwards 1.25s}
    .l6{opacity:0;animation:pop .05s forwards 1.4s}

    /* title */
    .title{font-family:'JetBrains Mono','Courier New',monospace;font-weight:700;font-size:32px;fill:url(#titleGrad);filter:url(#glow-title);opacity:0;animation:fi .6s ease forwards 1.55s}
    .sub{font-family:'JetBrains Mono','Courier New',monospace;font-size:11px;fill:#94A3B8;opacity:0;animation:fi .5s ease forwards 1.8s}

    /* tags */
    .tag{opacity:0}
    .tg1{animation:tp .3s ease forwards 2.0s}
    .tg2{animation:tp .3s ease forwards 2.15s}
    .tg3{animation:tp .3s ease forwards 2.3s}
    .tg4{animation:tp .3s ease forwards 2.45s}
    .tg5{animation:tp .3s ease forwards 2.6s}
    .tg6{animation:tp .3s ease forwards 2.75s}

    /* radar */
    .radar-base{opacity:0;animation:fi .8s ease forwards 1.6s}
    .radar-sweep{transform-origin:788px 120px;animation:sweep 3s linear infinite 2.2s;opacity:0;animation-fill-mode:forwards}
    .radar-sweep-show{opacity:0;animation:radarshow .1s ease forwards 2.2s, sweep 3s linear infinite 2.3s}

    /* protocol nodes */
    .node{opacity:0}
    .n-crit{fill:#EF4444;filter:url(#glow-crit)}
    .n-med{fill:#EAB308;filter:url(#glow-node)}
    .n-low{fill:#22C55E;filter:url(#glow-node)}
    .nd1{animation:nodeshow .3s ease forwards 2.4s}
    .nd2{animation:nodeshow .3s ease forwards 2.6s}
    .nd3{animation:nodeshow .3s ease forwards 2.8s}
    .nd4{animation:nodeshow .3s ease forwards 3.0s}
    .nd5{animation:nodeshow .3s ease forwards 3.2s}
    .nd6{animation:nodeshow .3s ease forwards 3.4s}
    .nd7{animation:nodeshow .3s ease forwards 3.6s}
    .nd8{animation:nodeshow .3s ease forwards 3.8s}

    /* node pulse rings for critical */
    .pulse-ring{fill:none;stroke-width:1;animation:pulsering 2s ease-out infinite}
    .pr1{animation-delay:0s}
    .pr2{animation-delay:.5s}
    .pr3{animation-delay:1s}

    /* particles */
    .pt{animation:float 3.5s ease-in-out infinite;opacity:.45}
    .p1{animation-delay:0s}.p2{animation-delay:.8s}.p3{animation-delay:1.6s}
    .p4{animation-delay:2.4s}.p5{animation-delay:.4s}.p6{animation-delay:1.2s}

    /* cursor */
    .cursor{animation:blink 1s step-end infinite 2.2s}

    @keyframes dc{to{stroke-dashoffset:0}}
    @keyframes dl{to{stroke-dashoffset:0}}
    @keyframes pop{to{opacity:1}}
    @keyframes fi{to{opacity:1}}
    @keyframes tp{0%{opacity:0;transform:translateY(5px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes sweep{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes radarshow{to{opacity:1}}
    @keyframes nodeshow{0%{opacity:0;transform:scale(.3)}100%{opacity:1;transform:scale(1)}}
    @keyframes pulsering{0%{r:6;stroke-opacity:.8}100%{r:22;stroke-opacity:0}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  </style>

  <g clip-path="url(#clip)">
    <rect width="900" height="240" fill="url(#bg)"/>

    <!-- grid -->
    <line class="grid" x1="0" y1="30"  x2="900" y2="30"/>
    <line class="grid" x1="0" y1="60"  x2="900" y2="60"/>
    <line class="grid" x1="0" y1="90"  x2="900" y2="90"/>
    <line class="grid" x1="0" y1="120" x2="900" y2="120"/>
    <line class="grid" x1="0" y1="150" x2="900" y2="150"/>
    <line class="grid" x1="0" y1="180" x2="900" y2="180"/>
    <line class="grid" x1="0" y1="210" x2="900" y2="210"/>
    <line class="grid" x1="90"  y1="0" x2="90"  y2="240"/>
    <line class="grid" x1="180" y1="0" x2="180" y2="240"/>
    <line class="grid" x1="270" y1="0" x2="270" y2="240"/>
    <line class="grid" x1="360" y1="0" x2="360" y2="240"/>
    <line class="grid" x1="450" y1="0" x2="450" y2="240"/>
    <line class="grid" x1="540" y1="0" x2="540" y2="240"/>
    <line class="grid" x1="630" y1="0" x2="630" y2="240"/>
    <line class="grid" x1="720" y1="0" x2="720" y2="240"/>
    <line class="grid" x1="810" y1="0" x2="810" y2="240"/>

    <!-- top accent line -->
    <line class="topline" x1="22" y1="9" x2="878" y2="9" stroke="url(#accentGrad)" stroke-width="1.5" fill="none"/>

    <!-- corners -->
    <path class="corner c1" d="M22 32 L22 20 L34 20"/>
    <path class="corner c2" d="M878 32 L878 20 L866 20"/>
    <path class="corner c3" d="M22 208 L22 220 L34 220"/>
    <path class="corner c4" d="M878 208 L878 220 L866 220"/>

    <!-- particles left -->
    <circle class="pt p1" cx="12" cy="55"  r="1.5" fill="#7C3AED"/>
    <circle class="pt p2" cx="8"  cy="100" r="1"   fill="#06B6D4"/>
    <circle class="pt p3" cx="15" cy="145" r="1.5" fill="#7C3AED"/>
    <circle class="pt p4" cx="7"  cy="190" r="1"   fill="#06B6D4"/>
    <circle class="pt p5" cx="18" cy="75"  r="1"   fill="#06B6D4"/>
    <circle class="pt p6" cx="11" cy="168" r="1.5" fill="#7C3AED"/>

    <!-- ═══════════════════════════════════ LEFT PANEL ═══════════════════════════════════ -->

    <!-- protocol stream header -->
    <text class="l0" font-family="'JetBrains Mono','Courier New',monospace" font-size="9px" fill="#7C3AED" x="40" y="46">// PROTOCOL THREAT MATRIX — ATT&amp;CK MAPPED</text>

    <!-- table header -->
    <text class="l1" font-family="'JetBrains Mono','Courier New',monospace" font-size="9px" x="40" y="62">
      <tspan fill="#06B6D4">PROTO</tspan>
      <tspan fill="#555" dx="8">···</tspan>
      <tspan fill="#06B6D4" dx="8">PORT</tspan>
      <tspan fill="#555" dx="8">···</tspan>
      <tspan fill="#06B6D4" dx="8">SEV</tspan>
      <tspan fill="#555" dx="8">···</tspan>
      <tspan fill="#06B6D4" dx="8">PRIMARY RISK</tspan>
    </text>
    <line class="l1" x1="40" y1="66" x2="660" y2="66" stroke="#0d1f3a" stroke-width="1"/>

    <!-- row 1: SMB CRITICAL -->
    <text class="l2" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5px" x="40" y="80">
      <tspan fill="#E6EDF3" font-weight="700">SMB</tspan>
      <tspan fill="#555" dx="18">·</tspan>
      <tspan fill="#94A3B8" dx="6">445/TCP</tspan>
      <tspan fill="#555" dx="8">·</tspan>
      <tspan fill="#EF4444" dx="6" font-weight="700">CRITICAL</tspan>
      <tspan fill="#94A3B8" dx="8">·</tspan>
      <tspan fill="#94A3B8" dx="4">PtH · lateral movement · EternalBlue</tspan>
      <tspan fill="#7C3AED" dx="6">T1550.002</tspan>
    </text>

    <!-- row 2: RDP CRITICAL -->
    <text class="l3" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5px" x="40" y="95">
      <tspan fill="#E6EDF3" font-weight="700">RDP</tspan>
      <tspan fill="#555" dx="15">·</tspan>
      <tspan fill="#94A3B8" dx="6">3389/TCP</tspan>
      <tspan fill="#555" dx="8">·</tspan>
      <tspan fill="#EF4444" dx="6" font-weight="700">CRITICAL</tspan>
      <tspan fill="#94A3B8" dx="8">·</tspan>
      <tspan fill="#94A3B8" dx="4">brute force · lateral · BlueKeep</tspan>
      <tspan fill="#7C3AED" dx="6">T1021.001</tspan>
    </text>

    <!-- row 3: DNS -->
    <text class="l4" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5px" x="40" y="110">
      <tspan fill="#E6EDF3" font-weight="700">DNS</tspan>
      <tspan fill="#555" dx="18">·</tspan>
      <tspan fill="#94A3B8" dx="6">53/UDP,TCP</tspan>
      <tspan fill="#555" dx="8">·</tspan>
      <tspan fill="#EF4444" dx="6" font-weight="700">CRITICAL</tspan>
      <tspan fill="#94A3B8" dx="8">·</tspan>
      <tspan fill="#94A3B8" dx="4">C2 tunneling · DGA · exfil</tspan>
      <tspan fill="#7C3AED" dx="6">T1572 T1568</tspan>
    </text>

    <!-- row 4: Kerberos -->
    <text class="l5" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5px" x="40" y="125">
      <tspan fill="#E6EDF3" font-weight="700">KRB5</tspan>
      <tspan fill="#555" dx="10">·</tspan>
      <tspan fill="#94A3B8" dx="6">88/TCP,UDP</tspan>
      <tspan fill="#555" dx="8">·</tspan>
      <tspan fill="#EF4444" dx="6" font-weight="700">CRITICAL</tspan>
      <tspan fill="#94A3B8" dx="8">·</tspan>
      <tspan fill="#94A3B8" dx="4">Kerberoast · Golden Ticket · PtT</tspan>
      <tspan fill="#7C3AED" dx="6">T1558</tspan>
    </text>

    <!-- row 5: SSH -->
    <text class="l6" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5px" x="40" y="140">
      <tspan fill="#E6EDF3" font-weight="700">SSH</tspan>
      <tspan fill="#555" dx="18">·</tspan>
      <tspan fill="#94A3B8" dx="6">22/TCP</tspan>
      <tspan fill="#555" dx="8">·</tspan>
      <tspan fill="#EF4444" dx="6" font-weight="700">CRITICAL</tspan>
      <tspan fill="#94A3B8" dx="8">·</tspan>
      <tspan fill="#94A3B8" dx="4">stolen keys · C2 tunnel · lateral</tspan>
      <tspan fill="#7C3AED" dx="6">T1021.004</tspan>
    </text>

    <!-- divider -->
    <line x1="40" y1="150" x2="660" y2="150" stroke="#0d1f3a" stroke-width="1" opacity="0" style="animation:pop .1s forwards 1.45s"/>

    <!-- main title -->
    <text class="title" x="40" y="190">protocol-threat-matrix</text>

    <!-- subtitle -->
    <text class="sub" x="42" y="208">protocol threat matrix · ATT&amp;CK mapped · event IDs · detection · remediation</text>

    <!-- tags -->
    <g class="tag tg1">
      <rect x="40" y="218" width="70" height="17" rx="3" fill="none" stroke="#7C3AED" stroke-width="1"/>
      <circle cx="50" cy="226" r="3" fill="#7C3AED"/>
      <text font-family="'JetBrains Mono','Courier New',monospace" font-size="9px" x="57" y="230" fill="#E6EDF3">ATT&amp;CK</text>
    </g>
    <g class="tag tg2">
      <rect x="118" y="218" width="62" height="17" rx="3" fill="none" stroke="#06B6D4" stroke-width="1"/>
      <circle cx="128" cy="226" r="3" fill="#06B6D4"/>
      <text font-family="'JetBrains Mono','Courier New',monospace" font-size="9px" x="135" y="230" fill="#E6EDF3">SOC</text>
    </g>
    <g class="tag tg3">
      <rect x="188" y="218" width="80" height="17" rx="3" fill="none" stroke="#EF4444" stroke-width="1"/>
      <circle cx="198" cy="226" r="3" fill="#EF4444"/>
      <text font-family="'JetBrains Mono','Courier New',monospace" font-size="9px" x="205" y="230" fill="#E6EDF3">Detection</text>
    </g>
    <g class="tag tg4">
      <rect x="276" y="218" width="78" height="17" rx="3" fill="none" stroke="#EAB308" stroke-width="1"/>
      <circle cx="286" cy="226" r="3" fill="#EAB308"/>
      <text font-family="'JetBrains Mono','Courier New',monospace" font-size="9px" x="293" y="230" fill="#E6EDF3">Protocols</text>
    </g>
    <g class="tag tg5">
      <rect x="362" y="218" width="76" height="17" rx="3" fill="none" stroke="#22C55E" stroke-width="1"/>
      <circle cx="372" cy="226" r="3" fill="#22C55E"/>
      <text font-family="'JetBrains Mono','Courier New',monospace" font-size="9px" x="379" y="230" fill="#E6EDF3">Event IDs</text>
    </g>
    <g class="tag tg6">
      <rect x="446" y="218" width="88" height="17" rx="3" fill="none" stroke="#7C3AED" stroke-width="1"/>
      <circle cx="456" cy="226" r="3" fill="#7C3AED"/>
      <text font-family="'JetBrains Mono','Courier New',monospace" font-size="9px" x="463" y="230" fill="#E6EDF3">Blue Team</text>
    </g>

    <!-- cursor -->
    <rect class="cursor" x="42" y="232" width="7" height="2" fill="#7C3AED" opacity=".8"/>

    <!-- ═══════════════════════════════════ RADAR PANEL ═══════════════════════════════════ -->
    <g class="radar-base">
      <!-- radar background glow -->
      <circle cx="788" cy="120" r="95" fill="url(#radarGlow)"/>

      <!-- radar rings -->
      <circle cx="788" cy="120" r="90" fill="none" stroke="#06B6D4" stroke-width="0.4" stroke-opacity="0.25"/>
      <circle cx="788" cy="120" r="65" fill="none" stroke="#06B6D4" stroke-width="0.4" stroke-opacity="0.2"/>
      <circle cx="788" cy="120" r="40" fill="none" stroke="#06B6D4" stroke-width="0.4" stroke-opacity="0.2"/>
      <circle cx="788" cy="120" r="18" fill="none" stroke="#7C3AED" stroke-width="0.5" stroke-opacity="0.3"/>

      <!-- crosshairs -->
      <line x1="693" y1="120" x2="883" y2="120" stroke="#06B6D4" stroke-width="0.3" stroke-opacity="0.2"/>
      <line x1="788" y1="25"  x2="788" y2="215" stroke="#06B6D4" stroke-width="0.3" stroke-opacity="0.2"/>
      <line x1="724" y1="56"  x2="852" y2="184" stroke="#06B6D4" stroke-width="0.3" stroke-opacity="0.1"/>
      <line x1="852" y1="56"  x2="724" y2="184" stroke="#06B6D4" stroke-width="0.3" stroke-opacity="0.1"/>

      <!-- center dot -->
      <circle cx="788" cy="120" r="3" fill="#7C3AED" opacity="0.8"/>
      <circle cx="788" cy="120" r="1.5" fill="#06B6D4"/>
    </g>

    <!-- radar sweep -->
    <g clip-path="url(#radar-clip)" class="radar-sweep-show">
      <path d="M788 120 L878 120 A90 90 0 0 0 852 56 Z"
            fill="url(#sweepGrad)" opacity="0.35"/>
    </g>

    <!-- ── PROTOCOL NODES ── -->
    <!-- SMB - CRITICAL - top right -->
    <g class="node nd1" style="transform-origin:848px 60px">
      <circle class="pulse-ring pr1" cx="848" cy="60" r="6" stroke="#EF4444" stroke-opacity=".6"/>
      <circle class="pulse-ring pr2" cx="848" cy="60" r="6" stroke="#EF4444" stroke-opacity=".4"/>
      <circle cx="848" cy="60" r="6" class="n-crit"/>
      <text font-family="'JetBrains Mono','Courier New',monospace" font-size="7px" fill="#E6EDF3" text-anchor="middle" x="848" y="75">SMB</text>
    </g>

    <!-- RDP - CRITICAL - right -->
    <g class="node nd2" style="transform-origin:875px 110px">
      <circle class="pulse-ring pr2" cx="875" cy="110" r="6" stroke="#EF4444" stroke-opacity=".6"/>
      <circle cx="875" cy="110" r="6" class="n-crit"/>
      <text font-family="'JetBrains Mono','Courier New',monospace" font-size="7px" fill="#E6EDF3" text-anchor="middle" x="875" y="125">RDP</text>
    </g>

    <!-- DNS - CRITICAL - bottom right -->
    <g class="node nd3" style="transform-origin:850px 178px">
      <circle class="pulse-ring pr3" cx="850" cy="178" r="6" stroke="#EF4444" stroke-opacity=".6"/>
      <circle cx="850" cy="178" r="6" class="n-crit"/>
      <text font-family="'JetBrains Mono','Courier New',monospace" font-size="7px" fill="#E6EDF3" text-anchor="middle" x="850" y="193">DNS</text>
    </g>

    <!-- KRB5 - CRITICAL - left -->
    <g class="node nd4" style="transform-origin:702px 110px">
      <circle class="pulse-ring pr1" cx="702" cy="110" r="6" stroke="#EF4444" stroke-opacity=".6"/>
      <circle cx="702" cy="110" r="6" class="n-crit"/>
      <text font-family="'JetBrains Mono','Courier New',monospace" font-size="7px" fill="#E6EDF3" text-anchor="middle" x="702" y="125">KRB</text>
    </g>

    <!-- SSH - CRITICAL - bottom left -->
    <g class="node nd5" style="transform-origin:728px 178px">
      <circle class="pulse-ring pr2" cx="728" cy="178" r="5" stroke="#EF4444" stroke-opacity=".5"/>
      <circle cx="728" cy="178" r="5" class="n-crit"/>
      <text font-family="'JetBrains Mono','Courier New',monospace" font-size="7px" fill="#E6EDF3" text-anchor="middle" x="728" y="193">SSH</text>
    </g>

    <!-- SMTP - MEDIUM - top -->
    <g class="node nd6" style="transform-origin:788px 32px">
      <circle cx="788" cy="32" r="5" class="n-med"/>
      <text font-family="'JetBrains Mono','Courier New',monospace" font-size="7px" fill="#E6EDF3" text-anchor="middle" x="788" y="47">SMTP</text>
    </g>

    <!-- LDAP - CRITICAL - top left -->
    <g class="node nd7" style="transform-origin:726px 60px">
      <circle class="pulse-ring pr3" cx="726" cy="60" r="5" stroke="#EF4444" stroke-opacity=".5"/>
      <circle cx="726" cy="60" r="5" class="n-crit"/>
      <text font-family="'JetBrains Mono','Courier New',monospace" font-size="7px" fill="#E6EDF3" text-anchor="middle" x="726" y="75">LDAP</text>
    </g>

    <!-- HTTPS - MEDIUM - bottom center -->
    <g class="node nd8" style="transform-origin:788px 207px">
      <circle cx="788" cy="207" r="4" class="n-med"/>
      <text font-family="'JetBrains Mono','Courier New',monospace" font-size="7px" fill="#E6EDF3" text-anchor="middle" x="788" y="219">TLS</text>
    </g>

    <!-- connection lines from center to nodes (subtle) -->
    <g class="radar-base" opacity="0.15">
      <line x1="788" y1="120" x2="848" y2="60"  stroke="#EF4444" stroke-width="0.8"/>
      <line x1="788" y1="120" x2="875" y2="110" stroke="#EF4444" stroke-width="0.8"/>
      <line x1="788" y1="120" x2="850" y2="178" stroke="#EF4444" stroke-width="0.8"/>
      <line x1="788" y1="120" x2="702" y2="110" stroke="#EF4444" stroke-width="0.8"/>
      <line x1="788" y1="120" x2="728" y2="178" stroke="#EF4444" stroke-width="0.8"/>
      <line x1="788" y1="120" x2="788" y2="32"  stroke="#EAB308" stroke-width="0.8"/>
      <line x1="788" y1="120" x2="726" y2="60"  stroke="#EF4444" stroke-width="0.8"/>
      <line x1="788" y1="120" x2="788" y2="207" stroke="#EAB308" stroke-width="0.8"/>
    </g>

    <!-- legend bottom right -->
    <g class="radar-base" opacity="0.8">
      <circle cx="698" cy="218" r="4" fill="#EF4444" filter="url(#glow-node)"/>
